{% extends "base.html" %}
{% block title %}Associar Gestor — {{ sector.nome }}{% endblock %}
{% block breadcrumb %}Sectores › {{ sector.nome }} › Associar Gestor{% endblock %}

{% block content %}
<style>
/* ════════════════════════════════════════════════════
   ASSOCIAR GESTOR
════════════════════════════════════════════════════ */

.ag-wrapper {
  max-width: 480px;
  margin: 0 auto;
  animation: agIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes agIn {
  from { opacity:0; transform:translateY(20px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── CARD ────────────────────────────────────────── */
.ag-card {
  background: rgba(13,43,94,.42);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(4,30,66,.32);
  position: relative;
}
.ag-card::before {
  content: '';
  position: absolute; top:0; left:10%; right:10%; height:2px;
  background: linear-gradient(90deg, transparent, #ce93d8, transparent);
  pointer-events: none;
}

/* ── HEADER ──────────────────────────────────────── */
.ag-header {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 24px;
  background: linear-gradient(90deg, rgba(206,147,216,.15), rgba(4,30,66,.2));
  border-bottom: 1px solid var(--glass-border);
}
.ag-header-icon {
  width: 44px; height: 44px; flex-shrink: 0;
  background: rgba(206,147,216,.1);
  border: 1px solid rgba(206,147,216,.22);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: #ce93d8;
}
.ag-header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem; letter-spacing: 2px; line-height: 1;
  color: var(--white);
}
.ag-header-sub { font-size: .72rem; color: var(--grey); margin-top: 3px; }

.sector-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(79,195,247,.08);
  border: 1px solid rgba(79,195,247,.18);
  border-radius: 30px; padding: 3px 12px;
  font-size: .75rem; font-weight: 700;
  letter-spacing: 1px; color: var(--accent);
  margin-top: 5px;
}
.sector-tag i { font-size: .65rem; }

/* ── BODY ────────────────────────────────────────── */
.ag-body { padding: 24px; }

/* form.as_p override */
.ag-body p { margin-bottom: 14px; }
.ag-body p label {
  display: block;
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: rgba(255,255,255,.42); margin-bottom: 6px;
}

.ag-wrapper input[type="text"],
.ag-wrapper input[type="email"],
.ag-wrapper input[type="number"],
.ag-wrapper select,
.ag-wrapper textarea {
  width: 100%;
  background: rgba(4,30,66,.55) !important;
  border: 1px solid var(--glass-border) !important;
  border-radius: var(--radius-md) !important;
  color: var(--white) !important;
  padding: 11px 13px !important;
  font-family: 'Barlow', sans-serif !important;
  font-size: .9rem !important;
  outline: none !important;
  -webkit-appearance: none;
  transition: border-color var(--ease-fast), box-shadow var(--ease-fast), background var(--ease-fast) !important;
}
.ag-wrapper input:focus,
.ag-wrapper select:focus,
.ag-wrapper textarea:focus {
  border-color: #ce93d8 !important;
  background: rgba(4,30,66,.85) !important;
  box-shadow: 0 0 0 3px rgba(206,147,216,.15) !important;
}
.ag-wrapper input::placeholder { color: rgba(255,255,255,.25) !important; }
.ag-wrapper select option { background: var(--navy); color: var(--white); }

/* ── FOOTER ──────────────────────────────────────── */
.ag-footer {
  display: flex; align-items: center;
  justify-content: flex-end; gap: 10px;
  padding: 16px 24px;
  border-top: 1px solid var(--glass-border);
  background: rgba(4,30,66,.3);
}

.btn-ag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 24px;
  border: none; border-radius: var(--radius-md);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: 2px;
  cursor: pointer; text-decoration: none; white-space: nowrap;
  transition: transform var(--ease-spring), box-shadow var(--ease-base), background var(--ease-fast);
  position: relative; overflow: hidden;
}
.btn-ag::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
  transform: translateX(-100%); transition: transform .5s ease;
}
.btn-ag:hover::before { transform: translateX(100%); }
.btn-ag:hover  { transform: translateY(-2px); }
.btn-ag:active { transform: scale(.97); }

.btn-save-ag {
  background: linear-gradient(135deg, #9c27b0, #6a1b9a);
  color: var(--white);
  box-shadow: 0 4px 18px rgba(156,39,176,.3);
}
.btn-save-ag:hover { box-shadow: 0 8px 26px rgba(156,39,176,.45); color: var(--white); }
.btn-save-ag .sp {
  display:none; width:14px; height:14px;
  border:2px solid rgba(255,255,255,.3); border-top-color:white;
  border-radius:50%; animation:spin .7s linear infinite;
}
.btn-save-ag.loading .sp  { display:inline-block; }
.btn-save-ag.loading .lbl { opacity:.7; }
@keyframes spin { to { transform:rotate(360deg); } }

.btn-back-ag {
  background: transparent;
  border: 1px solid var(--glass-border) !important;
  color: rgba(255,255,255,.55);
}
.btn-back-ag:hover { background: rgba(255,255,255,.07); color: var(--white); }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 480px) {
  .ag-footer { flex-direction: column; }
  .btn-ag { width: 100%; justify-content: center; }
}
</style>

<div class="ag-wrapper">
  <div class="ag-card">

    <!-- HEADER -->
    <div class="ag-header">
      <div class="ag-header-icon"><i class="fas fa-user-gear"></i></div>
      <div>
        <div class="ag-header-title">Associar Gestor</div>
        <div class="sector-tag">
          <i class="fas fa-map-marker-alt"></i> {{ sector.nome }}
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="ag-body">
      <form method="post" id="formGestor">
        {% csrf_token %}
        {{ form.as_p }}
      </form>
    </div>

    <!-- FOOTER -->
    <div class="ag-footer">
      <a href="{% url 'lista_sectores' %}" class="btn-ag btn-back-ag">
        <i class="fas fa-arrow-left"></i> Voltar
      </a>
      <button type="submit" form="formGestor" class="btn-ag btn-save-ag" id="btnSave">
        <span class="sp"></span>
        <span class="lbl"><i class="fas fa-floppy-disk"></i> Guardar</span>
      </button>
    </div>

  </div>
</div>

<script>
(function () {
  var form = document.getElementById('formGestor');
  var btn  = document.getElementById('btnSave');
  if (form && btn) {
    form.addEventListener('submit', function () {
      btn.classList.add('loading'); btn.disabled = true;
      setTimeout(function () { btn.classList.remove('loading'); btn.disabled = false; }, 6000);
    });
  }
  document.querySelectorAll('.ag-wrapper input, .ag-wrapper select, .ag-wrapper textarea').forEach(function (el) {
    el.classList.remove('form-control', 'form-select');
  });
})();
</script>
{% endblock %}
